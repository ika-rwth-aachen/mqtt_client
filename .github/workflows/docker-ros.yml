name: docker-ros

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  ros2-humble:
    runs-on: ubuntu-latest
    steps:
      - uses: ika-rwth-aachen/docker-ros@main
        with:
          platform: amd64
          target: run
          base-image: rwthika/ros2:humble
          command: ros2 launch mqtt_client standalone.launch.xml
          image-tag: humble
          rmw-implementation: rmw_zenoh_cpp

  ros2-jazzy:
    runs-on: ubuntu-latest
    steps:
      - uses: ika-rwth-aachen/docker-ros@main
        with:
          platform: amd64
          target: run
          base-image: rwthika/ros2:jazzy
          command: ros2 launch mqtt_client standalone.launch.xml
          image-tag: jazzy
          rmw-implementation: rmw_zenoh_cpp

  ros2-kilted:
    runs-on: ubuntu-latest
    steps:
      - uses: ika-rwth-aachen/docker-ros@main
        with:
          platform: amd64
          target: run
          base-image: rwthika/ros2:kilted
          command: ros2 launch mqtt_client standalone.launch.xml
          image-tag: kilted
          rmw-implementation: rmw_zenoh_cpp

  ros2-lyrical:
    runs-on: ubuntu-latest
    steps:
      - uses: ika-rwth-aachen/docker-ros@main
        with:
          platform: amd64
          target: run
          base-image: ros:lyrical-ros-base # TODO: rwthika/ros2:lyrical
          command: ros2 launch mqtt_client standalone.launch.xml
          image-tag: lyrical
          enable-push-as-latest: 'true'
          rmw-implementation: rmw_zenoh_cpp

  ros2-rolling:
    runs-on: ubuntu-latest
    steps:
      - uses: ika-rwth-aachen/docker-ros@main
        with:
          platform: amd64
          target: run
          base-image: ros:rolling-ros-base
          command: ros2 launch mqtt_client standalone.launch.xml
          image-tag: rolling
          rmw-implementation: rmw_zenoh_cpp
